# AMJax benchmark: full configuration
# One JSON per parameter combination (cartesian product of all values below).

# Choose one or more devices to benchmark on. If multiple, runs will be grouped by device.
device:
  - cpu
  - gpu

mode:
  - single
  - vmap

# pyamg, pyamg_pcg, cg: PyAMG/SciPy solvers (mode=single: one solve, mode=vmap: for-loop over K)
# amjax, amjax_pcg: AMJax solvers (mode=single: one JIT solve, mode=vmap: jax.vmap over K)
methods:
  - pyamg
  - pyamg_pcg
  - cg
  - amjax
  - amjax_pcg

grid_sizes:
  - 50
  - 100
  - 200
  - 500
  - 1000

# PyAMG hierarchy factory.
# Available in PyAMG: smoothed_aggregation, rootnode, pairwise, ruge_stuben, air
solvers:
  - smoothed_aggregation
  - rootnode
  - pairwise
  - ruge_stuben
  - air

# Solver used at the coarsest grid level.
# Available in AMJax: jacobi, lu, qr, pinv
coarse_solvers:
  - jacobi
  - pinv
  - lu
  - qr

# Convergence tolerance on ||b - Ax|| / ||b||
tol:
  - 1.0e-10

# Max cycle iterations (V, W, F)
maxiter_cycle:
  - 100

# Max iterations for CG-based methods
maxiter_solv:
  - 500

# Batch size K
vmap_k:
  - 64

# Floating-point precision 
dtypes:
  - f64
  - f32

# Multigrid cycle type.
# Available in AMJax: V, W, F
cycle_type:
  - V
  - W
  - F

# Iterative smoother applied at each level of the hierarchy (pre and postsmoother).
# Available in AMJax: jacobi
smoothers:
  - jacobi

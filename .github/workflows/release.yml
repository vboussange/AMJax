name: Release

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Release
        uses: patrick-kidger/action_update_python_project@v8
        with:
            python-version: "3.11"
            test-script: |
                cp -r ${{ github.workspace }}/tests ./tests
                mkdir -p benchmarks
                cp ${{ github.workspace }}/benchmarks/__init__.py ./benchmarks/__init__.py
                cp ${{ github.workspace }}/benchmarks/update_benchmark_docs.py ./benchmarks/update_benchmark_docs.py
                cp ${{ github.workspace }}/pyproject.toml ./pyproject.toml
                uv sync --extra tests --no-install-project --inexact
                PYTHONPATH="$PWD" uv run --no-sync pytest
            pypi-token: ${{ secrets.pypi_token }}
            github-user: vboussange
            github-token: ${{ github.token }}  # automatically created token

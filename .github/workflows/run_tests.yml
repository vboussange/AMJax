name: Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: uv sync --extra tests
      - name: Run tests
        run: uv run pytest tests/ -v

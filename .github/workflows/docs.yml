name: Docs

on:
  pull_request:
    paths:
      - "docs/**"
      - "zensical.toml"
      - "pyproject.toml"
      - "README.md"
      - "benchmarks/latest_summary.json"
      - "benchmarks/update_benchmark_docs.py"
      - ".github/workflows/docs.yml"
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "zensical.toml"
      - "pyproject.toml"
      - "README.md"
      - "benchmarks/latest_summary.json"
      - "benchmarks/update_benchmark_docs.py"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.11"

      - name: Check generated benchmark docs
        run: uv run --group docs python benchmarks/update_benchmark_docs.py --summary benchmarks/latest_summary.json --check

      - name: Build docs
        run: uv run --group docs python -m zensical build --strict

      - name: Configure Pages
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
